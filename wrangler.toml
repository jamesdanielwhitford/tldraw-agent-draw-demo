name = "tldraw-agent-draw-demo"
main = "worker/worker.ts"
compatibility_date = "2024-12-30"
assets = { not_found_handling = "single-page-application" }
preview_urls = true

[observability]
enabled = true

# Set up the durable object used for each tldraw room
[durable_objects]
bindings = [{ name = "AGENT_DURABLE_OBJECT", class_name = "AgentDurableObject" }]

# Durable objects require migrations to create/modify/delete them.
# SQLite-backed class so it works on the Workers free plan (the DO keeps no
# persistent storage; it only coordinates a room in memory).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["AgentDurableObject"]
